name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sources
        shell: bash
        run: python -m py_compile pingtop.py pingtop/*.py tests/*.py scripts/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  build:
    name: Build zipapp
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build pingtop.pyz
        run: python scripts/build_pyz.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingtop-pyz-${{ github.sha }}
          path: dist/pingtop.pyz

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate version tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a version tag like v0.1.0, got: $tag" >&2
            exit 1
          fi

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: pingtop-pyz-${{ github.sha }}
          path: dist

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="dist/pingtop.pyz"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" \
              --title "pingtop $tag" \
              --notes "Automated release for ${tag}."
          fi

