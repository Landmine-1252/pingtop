name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sources
        shell: bash
        run: python -m py_compile pingtop.py pingtop/*.py tests/*.py scripts/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  build:
    name: Build zipapp
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build pingtop.pyz
        run: python scripts/build_pyz.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingtop-pyz-${{ github.sha }}
          path: dist/pingtop.pyz

